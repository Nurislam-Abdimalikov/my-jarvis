# ============================================================
# Jarvis — основной конфиг.
# Все параметры можно менять без перезапуска кодовой базы.
# Секреты — в .env, не здесь.
# ============================================================

# Язык по умолчанию: ru | en
language: ru

# Имя ассистента (как обращаться) — используется в системном промпте.
assistant_name: Джарвис

# --- Wake word ---
# Если enabled=true, ассистент слушает фоном и ждёт слово "Джарвис".
# Если enabled=false, используется push-to-talk (зажми пробел).
wake_word:
  enabled: true
  engine: openwakeword              # open-source, бесплатный, без регистрации
  # Можно указать одну модель строкой или несколько списком — любая срабатывание
  # засчитывается. Несколько моделей повышают шанс поймать твоё произношение.
  # Только hey_jarvis: модели alexa/hey_mycroft давали ложные срабатывания
  # на фоновую речь и шум (их кодовые слова ты не произносишь — значит любое
  # их срабатывание ложное). Одна целевая модель = меньше ложняка.
  keyword:
    - hey_jarvis
  threshold: 0.30                   # max-of-N окно делает порог стабильнее
  min_consecutive_frames: 2         # ≥2 кадра (~160мс) подряд выше порога — режет одиночные шумовые пики
  pre_roll_ms: 1000                 # сохранять последние N мс аудио ДО триггера
  window_frames: 6                  # max за последние ~480 мс ≥ threshold = триггер
  debug_scores: true                # печатать score'ы (выключи когда настроишь)
  silence_threshold: 0.005          # RMS порог для определения тишины
  silence_duration: 1.5             # сколько подряд секунд тишины = конец фразы
  initial_grace: 5.0                # сколько ждать пока юзер начнёт говорить после wake
  max_command_duration: 15.0        # потолок длины команды (сек)
  cooldown_after_trigger: 0.3       # дроп ~хвоста слова "Джарвис"

# --- Push-to-talk (используется если wake_word.enabled=false) ---
push_to_talk:
  enabled: true
  hotkey: space                     # клавиша которую держать чтобы говорить

# --- Speech-to-Text (Whisper) ---
stt:
  engine: whisper
  model: small                      # tiny | base | small (быстро) | medium (точнее, но +1 ГБ и +1.5 сек/фраза) | large-v3
  device: auto                      # auto | cpu | mps | cuda
  compute_type: int8                # int8 | float16 | float32
  language: ru                      # ru | en | auto
  initial_prompt: ""                # пусто = словарь по умолчанию (см. assistant.py)
  beam_size: 5                      # 1=greedy (быстро) | 5=точнее (рекомендуется на small)

# --- Text-to-Speech ---
tts:
  engine: xtts                      # say (мгновенно, голос macOS) | xtts (~3-5 сек, голос Джарвиса)
  say:
    voice: Yuri                     # `say -v ?` — список голосов macOS
    rate: 200
  # XTTS-v2 (Coqui) — voice cloning по `ref_file`. Использует тот же
  # actor_master.wav что был для F5-TTS, но в 3-5 раз быстрее на M-чипе.
  xtts:
    ref_file: assets/sounds/voices/jarvis-clean/actor_master.wav
    language: ru                    # ru | en | es | fr | de | ... (17 языков)
    device: auto                    # auto = MPS на Apple Silicon | mps | cpu
    cache_enabled: true             # кешировать сгенерированные wav на диск
    speed: 1.0                      # 0.5..2.0
    temperature: 0.5                # ниже = стабильнее произношение топонимов
    top_k: 50
    top_p: 0.85
    repetition_penalty: 5.0

# --- LLM brain ---
# Доступны 3 движка (все OpenAI-совместимые, поддерживают tool calling):
#   aihubmix — gpt-5.5-free (бесплатный, рек.). Ключ: AIHUBMIX_API_KEY
#   mistral  — mistral-small-latest (быстрый, free tier). Ключ: MISTRAL_API_KEY
#   gemini   — gemini-2.5-flash. Ключ: GOOGLE_API_KEY
brain:
  engine: mistral
  aihubmix:
    model: gpt-5.5-free
    max_tokens: 1024
    temperature: 0.7
    base_url: https://aihubmix.com/v1
  mistral:
    model: mistral-small-latest
    max_tokens: 1024
    temperature: 0.7
    base_url: https://api.mistral.ai/v1
  gemini:
    model: gemini-2.5-flash
    max_tokens: 1024
    temperature: 0.7
  max_history: 20
  system_prompt_path: config/system_prompt.txt

# --- Аудио параметры ---
audio:
  sample_rate: 16000
  channels: 1
  input_device: null                # null = дефолтный микрофон
  output_device: null
  vad:
    enabled: true
    threshold: 0.5
    silence_duration: 1.5
    min_speech_duration: 0.3

# --- Логирование ---
logging:
  level: INFO                       # DEBUG | INFO | WARNING | ERROR
  file: logs/jarvis.log
  rotation: "10 MB"
  retention: "7 days"

# --- Voice Reactions ---
# Готовые клипы из Priler/jarvis (русский актёр, имитирующий голос Paul Bettany).
# Воспроизводятся на ключевые события вместо TTS — звучит аутентичнее.
reactions:
  enabled: true
  pack_dir: assets/sounds/voices/jarvis-remaster
  fallback_dir: assets/sounds/voices/jarvis-og
  play_on_wake: true                # "Слушаю, сэр" на срабатывание wake word
  play_on_ok: true                  # "Готово" после успешной команды (зарезервировано)
  play_on_greet: true               # приветствие при старте (по времени суток)
  play_on_goodbye: true             # "До свидания" при выходе
