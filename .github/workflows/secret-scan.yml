name: Secret Scan

on:
  push:
    branches: ["**"]
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITLEAKS_CONFIG: ./.gitleaks.toml
          # GITLEAKS_LICENSE не нужен для public OSS репо.
